<h1>Registro en DeliGo</h1>
<p class="intro">Crea tu cuenta para pedir y seguir envíos.</p>

<form class="form" (ngSubmit)="registrar()">
  <label>
    Nombre completo
    <input type="text" [(ngModel)]="nombre" name="nombre" required />
  </label>
  <label>
    Correo electrónico
    <input type="email" [(ngModel)]="email" name="email" required />
  </label>
  <label>
    Contraseña
    <input type="password" [(ngModel)]="password" name="password" required />
  </label>
  <label>
    Dirección de entrega
    <input type="text" [(ngModel)]="direccion" name="direccion" />
  </label>
  <button type="submit" class="btn-submit">Registrarse</button>
</form>

@if (mensaje) {
  <p class="mensaje" [class.error]="esError">{{ mensaje }}</p>
}

<p class="link">¿Ya tienes cuenta? <a routerLink="/login">Inicia sesión</a></p>
